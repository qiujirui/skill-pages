<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkBuddy Skills - 技能中心</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6; 
            background: #0d1117; 
            color: #c9d1d9; 
            padding: 40px 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { 
            color: #58a6ff; 
            border-bottom: 2px solid #30363d; 
            padding-bottom: 15px; 
            margin-bottom: 30px;
            text-align: center;
        }
        .subtitle {
            text-align: center;
            color: #8b949e;
            margin-bottom: 40px;
        }
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .skill-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 25px;
            transition: transform 0.2s, border-color 0.2s;
        }
        .skill-card:hover {
            transform: translateY(-5px);
            border-color: #58a6ff;
        }
        .skill-card h2 {
            color: #58a6ff;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        .skill-card p {
            color: #8b949e;
            margin-bottom: 15px;
            font-size: 0.95em;
        }
        .skill-link {
            display: inline-block;
            background: #238636;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9em;
        }
        .skill-link:hover {
            background: #2ea043;
        }
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #8b949e;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>🐾 WorkBuddy Skills</h1>
    <p class="subtitle">自定义技能中心 - 让 AI 更懂你的工作方式</p>

    <div class="skill-grid">
        <div class="skill-card">
            <h2>🚀 github-pages</h2>
            <p>通过 GitHub API 直接推送 HTML 页面到 GitHub Pages，无需安装 Git。</p>
            <a href="github-pages-skill.html" class="skill-link">查看详情 →</a>
        </div>

        <div class="skill-card">
            <h2>🔗 ngrok-tunnel</h2>
            <p>将本地 HTTP 服务通过 ngrok 暴露到公网，实现内网穿透。</p>
            <a href="ngrok-tunnel-skill.html" class="skill-link">查看详情 →</a>
        </div>

        <div class="skill-card">
            <h2>📦 zip-to-rar</h2>
            <p>将文件或目录打包为 RAR 格式压缩包，支持在线转换。</p>
            <a href="zip-to-rar-skill.html" class="skill-link">查看详情 →</a>
        </div>
    </div>

    <div class="footer">
        <p>WorkBuddy 智能助手 · 让工作更高效</p>
    </div>
</body>
</html>
